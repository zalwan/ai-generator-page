services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-sales-app
    restart: unless-stopped
    # Laravel reads .env from inside the container directly (via the bind mount),
    # so we intentionally don't use docker compose env_file — that would shadow
    # APP_KEY etc. with empty host values that take precedence over the .env file.
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    volumes:
      - app_storage:/var/www/html/storage
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks: [appnet]

  nginx:
    image: nginx:1.27-alpine
    container_name: ai-sales-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks: [appnet]

  mysql:
    image: mysql:8.4
    container_name: ai-sales-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ai_sales}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "${DB_PORT_FORWARD:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [appnet]

volumes:
  mysql_data:
  app_storage:

networks:
  appnet:
    driver: bridge
